name: Terraform CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "**/*.tf"
      - ".github/workflows/terraform.yml"
  pull_request:
    paths:
      - "**/*.tf"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  TF_VERSION: 1.6.6
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
  S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}

jobs:
  terraform-plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Validate AWS role configuration
        run: |
          echo "AWS_REGION=${AWS_REGION}"
          echo "AWS_ROLE_ARN=${AWS_ROLE_ARN}"
          echo "S3_BUCKET_NAME=${S3_BUCKET_NAME}"
          if [ -z "${AWS_ROLE_ARN}" ]; then
            echo "AWS_ROLE_ARN is not set. Add it as a GitHub Actions variable named AWS_ROLE_ARN."
            exit 1
          fi

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-terraform

      - name: Terraform Init
        run: terraform init -backend-config=backend.hcl -input=false

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -var="bucket_name=${{ secrets.S3_BUCKET_NAME }}" -input=false

  terraform-apply:
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    needs: terraform-plan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Validate AWS role configuration
        run: |
          echo "AWS_REGION=${AWS_REGION}"
          echo "AWS_ROLE_ARN=${AWS_ROLE_ARN}"
          echo "S3_BUCKET_NAME=${S3_BUCKET_NAME}"
          if [ -z "${AWS_ROLE_ARN}" ]; then
            echo "AWS_ROLE_ARN is not set. Add it as a GitHub Actions variable named AWS_ROLE_ARN."
            exit 1
          fi

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: github-actions-terraform

      - name: Terraform Init
        run: terraform init -backend-config=backend.hcl -input=false

      - name: Generate unique bucket name
        run: echo "bucket_name=prajyot-demo-${{ secrets.S3_BUCKET_NAME }}-$(date +%s)" >> $GITHUB_ENV

      - name: Terraform Apply
        run: terraform apply -auto-approve -var="bucket_name=${{ secrets.S3_BUCKET_NAME }}" -input=false
